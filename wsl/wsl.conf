# Install at: /etc/wsl.conf  (requires `wsl --shutdown` after edit to take effect)
#
# Two critical settings for this stack:
#   - generateHosts=false: prevents WSL from overwriting /etc/hosts on every boot,
#     which would wipe any Feishu IP pinning you've added there.
#   - [boot] command: runs feishu-routes.sh on every WSL start to re-add
#     static routes (route table is volatile, doesn't persist across reboots).

[user]
default=dog            # change to your username

[network]
generateHosts = false

[boot]
command = /usr/local/sbin/feishu-routes.sh
